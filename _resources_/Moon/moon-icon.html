<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Moon Icon</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .group:hover {
      border-color: rgba(120, 50, 80, 0.4);
      background: rgba(120, 50, 80, 0.05);
    }

    .icon-moon {
      width: 2rem;
      height: 2rem;
      color: #6b7280;
      transition: color 0.2s;
    }
    .group:hover .icon-moon { color: #78324f; }

    .group span {
      font-size: 9px;
      color: #6b7280;
      font-family: system-ui, sans-serif;
    }

    /* Moon — rock and stars twinkle */
    @keyframes moon-rock {
      0%, 100% { transform: rotate(0); }
      25% { transform: rotate(-8deg); }
      75% { transform: rotate(5deg); }
    }
    @keyframes moon-star-twinkle1 {
      0%, 100% { opacity: 0; transform: scale(0); }
      40%, 70% { opacity: 1; transform: scale(1.5); }
    }
    @keyframes moon-star-twinkle2 {
      0%, 100% { opacity: 0; transform: scale(0); }
      50%, 80% { opacity: 1; transform: scale(1.3); }
    }
    @keyframes moon-star-twinkle3 {
      0%, 100% { opacity: 0; transform: scale(0); }
      30%, 60% { opacity: 1; transform: scale(1.8); }
    }
    .group:hover .icon-moon-body { animation: moon-rock 0.7s ease; }
    .group:hover .icon-moon-star1 { animation: moon-star-twinkle1 0.7s ease forwards; }
    .group:hover .icon-moon-star2 { animation: moon-star-twinkle2 0.7s ease 0.1s forwards; }
    .group:hover .icon-moon-star3 { animation: moon-star-twinkle3 0.7s ease 0.2s forwards; }

    @media (prefers-reduced-motion: reduce) {
      .group:hover .icon-moon-body,
      .group:hover .icon-moon-star1,
      .group:hover .icon-moon-star2,
      .group:hover .icon-moon-star3 {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="group">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path class="icon-moon-body" d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9z" style="transform-origin: 10px 14px;"/>
      <circle class="icon-moon-star1" cx="19" cy="5" r="0.6" fill="currentColor" opacity="0"/>
      <circle class="icon-moon-star2" cx="21" cy="9" r="0.4" fill="currentColor" opacity="0"/>
      <circle class="icon-moon-star3" cx="17" cy="3" r="0.5" fill="currentColor" opacity="0"/>
    </svg>
    <span>Mond</span>
  </div>
</body>
</html>
