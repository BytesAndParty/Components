<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Star Icon</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .group:hover {
      border-color: rgba(120, 50, 80, 0.4);
      background: rgba(120, 50, 80, 0.05);
    }

    .icon-star {
      width: 2rem;
      height: 2rem;
      color: #6b7280;
      transition: color 0.2s;
    }
    .group:hover .icon-star { color: #78324f; }

    .group span {
      font-size: 9px;
      color: #6b7280;
      font-family: system-ui, sans-serif;
    }

    /* Star — spin and glow */
    @keyframes star-spin-glow {
      0% { transform: rotate(0) scale(1); filter: drop-shadow(0 0 0 transparent); }
      50% { transform: rotate(180deg) scale(1.15); filter: drop-shadow(0 0 4px #78324f); }
      100% { transform: rotate(360deg) scale(1); filter: drop-shadow(0 0 0 transparent); }
    }
    .group:hover .icon-star { animation: star-spin-glow 0.7s ease; }

    @media (prefers-reduced-motion: reduce) {
      .group:hover .icon-star {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="group">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon-star" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transform-origin: 12px 12px;">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
    <span>Stern</span>
  </div>
</body>
</html>
