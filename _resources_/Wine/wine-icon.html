<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Wine Icon</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .group:hover {
      border-color: rgba(120, 50, 80, 0.4);
      background: rgba(120, 50, 80, 0.05);
    }

    .icon-wine {
      width: 2rem;
      height: 2rem;
      color: #6b7280;
      transition: color 0.2s;
    }
    .group:hover .icon-wine { color: #78324f; }

    .group span {
      font-size: 9px;
      color: #6b7280;
      font-family: system-ui, sans-serif;
    }

    /* Wine — tilt and slosh */
    @keyframes wine-tilt {
      0%, 100% { transform: rotate(0); }
      30% { transform: rotate(8deg); }
      60% { transform: rotate(-4deg); }
    }
    @keyframes wine-slosh {
      0%, 100% { transform: rotate(0) scaleY(1); }
      25% { transform: rotate(6deg) scaleY(1.3); }
      50% { transform: rotate(-4deg) scaleY(0.8); }
      75% { transform: rotate(2deg) scaleY(1.1); }
    }
    .group:hover .icon-wine { animation: wine-tilt 0.7s ease; }
    .group:hover .icon-wine-liquid { animation: wine-slosh 0.8s ease; }

    @media (prefers-reduced-motion: reduce) {
      .group:hover .icon-wine,
      .group:hover .icon-wine-liquid {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="group">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon-wine" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8 22h8M12 15v7"/>
      <path d="M12 15a5 5 0 0 0 5-5c0-2-.5-4-2-8H9c-1.5 4-2 6-2 8a5 5 0 0 0 5 5z"/>
      <path class="icon-wine-liquid" d="M7.5 10.5c1.5 1 3 .5 4.5 1s3 0 4.5-1" opacity="0.6" style="transform-origin: 12px 10px;"/>
    </svg>
    <span>Wein</span>
  </div>
</body>
</html>
