<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Heart Icon</title>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #fafafa;
    }

    .group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      border-radius: 0.75rem;
      border: 1px solid rgba(0,0,0,0.1);
      padding: 1rem;
      transition: all 0.2s;
      cursor: pointer;
    }
    .group:hover {
      border-color: rgba(120, 50, 80, 0.4);
      background: rgba(120, 50, 80, 0.05);
    }

    .icon-heart {
      width: 2rem;
      height: 2rem;
      color: #6b7280;
      transition: color 0.2s;
    }
    .group:hover .icon-heart { color: #ef4444; }

    .group span {
      font-size: 9px;
      color: #6b7280;
      font-family: system-ui, sans-serif;
    }

    /* Heart — pulse and fill */
    @keyframes heart-pulse {
      0% { transform: scale(1); }
      25% { transform: scale(1.25); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    .group:hover .icon-heart { animation: heart-pulse 0.6s ease; }

    @media (prefers-reduced-motion: reduce) {
      .group:hover .icon-heart {
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <div class="group">
    <svg xmlns="http://www.w3.org/2000/svg" class="icon-heart" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="transform-origin: 12px 13px;">
      <path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/>
    </svg>
    <span>Heart</span>
  </div>
</body>
</html>
