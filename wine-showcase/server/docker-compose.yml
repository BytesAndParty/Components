services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wine_server
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: vendure_pw
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendure -d wine_server"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: Containerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: wine_server
      DB_USER: vendure
      DB_PASSWORD: vendure_pw
      NODE_ENV: production
      PORT: "3000"
      ADMIN_PORT: "3002"
      SUPERADMIN_USERNAME: superadmin
      SUPERADMIN_PASSWORD: superadmin
      COOKIE_SECRET: change-me-in-production
      CORS_ORIGINS: "http://localhost:5173,http://localhost:4321"
    ports:
      - "3000:3000"
      - "3002:3002"
    volumes:
      - assets:/app/data/assets

volumes:
  pgdata:
  assets:
